<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 슬로우 조깅</title>
    
    <link rel="icon" href="icon.jpeg">
    <link rel="apple-touch-icon" href="icon.jpeg">
    <link rel="stylesheet" href="style.css">
</head><body>
    <div class="container" id="appContainer">
        <header>
            <h1>나만의 슬로우 조깅</h1>
            <button id="themeToggle" class="btn small-btn">다크 모드</button>
        </header>
        
        <main>
            <!-- [화면 1] 코스 선택 캘린더 화면 -->
            <div id="calendarScreen">
                <div class="plan-header">
                    <h2>아주 천천히 달리는 4주 프로그램</h2>
                    <p>휴식 없이 30분 달리기를 향해 출발!</p>
                </div>
                
                <div class="week-section">
                    <div class="week-title">일 주차</div>
                    <div class="course-buttons">
                        <button class="course-btn" onclick="selectCourse(1, 26)">1회차<br><span>26:00</span></button>
                        <button class="course-btn" onclick="selectCourse(2, 27)">2회차<br><span>27:00</span></button>
                        <button class="course-btn" onclick="selectCourse(3, 28)">3회차<br><span>28:00</span></button>
                    </div>
                </div>

                <div class="week-section">
                    <div class="week-title">이 주차</div>
                    <div class="course-buttons">
                        <button class="course-btn" onclick="selectCourse(4, 30)">4회차<br><span>30:00</span></button>
                        <button class="course-btn" onclick="selectCourse(5, 33)">5회차<br><span>33:00</span></button>
                        <button class="course-btn" onclick="selectCourse(6, 34)">6회차<br><span>34:00</span></button>
                    </div>
                </div>

                <div class="week-section">
                    <div class="week-title">삼 주차</div>
                    <div class="course-buttons">
                        <button class="course-btn" onclick="selectCourse(7, 37)">7회차<br><span>37:00</span></button>
                        <button class="course-btn" onclick="selectCourse(8, 36)">8회차<br><span>36:00</span></button>
                        <button class="course-btn" onclick="selectCourse(9, 36)">9회차<br><span>36:00</span></button>
                    </div>
                </div>

                <div class="week-section">
                    <div class="week-title">사 주차</div>
                    <div class="course-buttons">
                        <button class="course-btn" onclick="selectCourse(10, 36)">10회차<br><span>36:00</span></button>
                        <button class="course-btn" onclick="selectCourse(11, 36)">11회차<br><span>36:30</span></button>
                        <button class="course-btn" onclick="selectCourse(12, 38)">12회차<br><span>38:00</span></button>
                    </div>
                </div>

                <!-- 💡 새로 변경된 부분: 모바일에서 누르기 편하게 버튼을 화면 하단에 고정하는 박스 설정 -->
                <div id="actionArea" class="action-area" style="display: none;">
                    <div class="action-content">
                        <h3 id="selectedCourseText">선택된 코스</h3>
                        <button id="startBtn" class="btn primary-btn">운동 시작</button>
                    </div>
                </div>
            </div>

            <!-- [화면 2] 인터벌 타이머 화면 -->
            <div id="timerScreen" style="display: none;">
                <h2 id="currentStageText" class="stage-title">준비 운동</h2>
                
                <div class="timer-circle">
                    <div id="intervalTimeDisplay" class="interval-time">04:00</div>
                    <div class="interval-label">현재 구간 남은 시간</div>
                </div>

                <div class="total-progress">
                    <p>총 남은 시간 <span id="totalTimeDisplay">26:00</span></p>
                    <p id="nextStageText" class="next-stage-text">다음: 천천히 달리기 (1분)</p>
                </div>

                <!-- 💡 새로 변경된 부분: 컨트롤 버튼들도 모바일에 맞게 하단에 꽉 차게 배치 -->
                <div class="controls action-content">
                    <button id="pauseBtn" class="btn pause-btn">일시 정지</button>
                    <button id="stopBtn" class="btn stop-btn">운동 종료</button>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
